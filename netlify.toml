[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/content/*"
  to = "https://jwsoutcwgwwfovrdrmjk.supabase.co/storage/v1/object/public/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://*.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.tile.openstreetmap.org; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org https://*.razorpay.com; img-src 'self' data: https://*.supabase.co https://images.unsplash.com https://i.pravatar.cc https://api.qrserver.com https://cdnjs.cloudflare.com https://*.tile.openstreetmap.org https://www.transparenttextures.com; frame-src 'self' https://checkout.razorpay.com https://*.razorpay.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
